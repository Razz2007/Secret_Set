<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretSet</title>
    <link rel="stylesheet" href="./css/inicio multijugador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
     
    <a href="./unirse o crear salta.html" class="back-arrow">
        <img src="./imgs/arrow-removebg-preview.png" alt="Flecha de retroceder" class="arrow-img">
    </a>

    <h1 class="title">Multijugador</h1>  
    
    <!-- Texto para seleccionar avatar -->
    <h2 class="subtitle">Elije tu avatar</h2>
    <div class="avatar-selection">
        <img src="./imgs/1.jpg" alt="Avatar 1" class="avatar-img">
        <img src="./imgs/2.jpg" alt="Avatar 2" class="avatar-img">
        <img src="./imgs/3.jpg" alt="Avatar 3" class="avatar-img">
    </div>

    <!-- Texto e input para ingresar código -->
    <h3 class="input-title">Ingresa el código para unirte a la sala</h3>
    <div class="code-input">
        <input type="text" placeholder="Fg12kwZ" class="input-box">
        <button class="arrow-button">
            <i class="fas fa-arrow-right"></i>
        </button>
    </div>
 
    <footer>
        <p>© 2024 <b>Secret Set</b> - Todos los Derechos Reservados</p>
    </footer>

    <script src="#"></script>
</body>
</html>
